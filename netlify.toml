[build]
  # Install root deps (serverless-http) + backend deps (express, stripe, etc.)
  command   = "npm install && cd backend && npm install"
  publish   = "cozynest"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Route all /api/* calls to the serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — serve index.html for all other routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
